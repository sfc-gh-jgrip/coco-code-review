name: coco-pr-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@coco-review')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.issue.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Cortex Code
        run: |
          curl -fsSL https://raw.githubusercontent.com/snowflakedb/cortex-code/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Cortex Code
        run: |
          which cortex
          cortex --help

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Authenticate to Snowflake via GitHub OIDC
        env:
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_HOST: ${{ vars.SNOWFLAKE_HOST }}
          SNOWFLAKE_USER: ${{ vars.SNOWFLAKE_USER }}
          SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
          SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
        run: |
          set -euo pipefail
          oidc_token="$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=snowflakecomputing.com" \
            | jq -r '.value')"
          if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
            echo "Failed to mint GitHub OIDC token" >&2
            exit 1
          fi
          mkdir -p "$HOME/.snowflake"
          cat > "$HOME/.snowflake/connections.toml" <<EOF
          [default]
          account = "$SNOWFLAKE_ACCOUNT"
          host = "$SNOWFLAKE_HOST"
          user = "$SNOWFLAKE_USER"
          role = "$SNOWFLAKE_ROLE"
          warehouse = "$SNOWFLAKE_WAREHOUSE"
          authenticator = "WORKLOAD_IDENTITY"
          workload_identity_provider = "OIDC"
          token = "$oidc_token"
          EOF
          chmod 600 "$HOME/.snowflake/connections.toml"

      - name: Run Coco PR review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_HOST: ${{ vars.SNOWFLAKE_HOST }}
          SNOWFLAKE_DEFAULT_CONNECTION_NAME: default
        run: python -m coco_pr_review