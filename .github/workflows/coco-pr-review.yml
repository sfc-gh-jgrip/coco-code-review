name: coco-pr-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@coco-review')
      )
    runs-on: ubuntu-latest
    # Backstop above the app's own watchdog (limits.job_timeout_sec, max 1800s
    # in the high profile). The app aborts gracefully first with a real reason;
    # this only fires if the process wedges entirely.
    timeout-minutes: 35

    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.issue.pull_request.head.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Cortex Code
        run: |
          curl -fsSL https://ai.snowflake.com/static/cc-scripts/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Cortex Code
        run: |
          which cortex
          cortex --help

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Authenticate to Snowflake via GitHub OIDC
        uses: ./.github/actions/snowflake-oidc
        with:
          account: ${{ vars.SNOWFLAKE_ACCOUNT }}
          host: ${{ vars.SNOWFLAKE_HOST }}
          user: ${{ vars.SNOWFLAKE_USER }}
          role: ${{ vars.SNOWFLAKE_ROLE }}
          warehouse: ${{ vars.SNOWFLAKE_WAREHOUSE }}

      - name: Mint Coco App token
        id: app-token
        if: ${{ vars.COCO_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.COCO_APP_ID }}
          private-key: ${{ secrets.COCO_APP_PRIVATE_KEY }}

      - name: Run Coco PR review
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          COCO_BOT_LOGIN: ${{ steps.app-token.outputs.app-slug && format('{0}[bot]', steps.app-token.outputs.app-slug) || 'github-actions[bot]' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          SNOWFLAKE_ACCOUNT: ${{ vars.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_HOST: ${{ vars.SNOWFLAKE_HOST }}
          SNOWFLAKE_DEFAULT_CONNECTION_NAME: default
        run: python -m coco_pr_review

      - name: Dump Cortex Code logs
        if: failure()
        run: |
          echo "=== cortex logs path ==="
          cortex logs path || true
          echo "=== cortex logs errors ==="
          cortex logs errors -n 200 --all-rotations || true
          echo "=== cortex logs tail ==="
          cortex logs tail || true