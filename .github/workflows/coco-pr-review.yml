name: coco-pr-review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  issues: write
  checks: write
  id-token: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@coco-review')
      )
    runs-on: ubuntu-latest
    # Backstop above the app's own watchdog (limits.job_timeout_sec, max 1800s
    # in the high profile). The app aborts gracefully first with a real reason;
    # this only fires if the process wedges entirely.
    timeout-minutes: 35

    steps:
      # issue_comment payloads do NOT carry the PR head SHA
      # (github.event.issue.pull_request.head.sha is null), so without this the
      # checkout below silently falls back to the default branch and the
      # verifier reads the wrong tree → verified=0 → a good review sticky gets
      # clobbered with "0 findings". Resolve the real head SHA from the API.
      - name: Resolve PR head SHA (comment triggers)
        id: pr-head
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefOid --jq .headRefOid)
          if [ -z "$sha" ]; then
            echo "::error::could not resolve PR head SHA for issue #${{ github.event.issue.number }}"
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || steps.pr-head.outputs.sha }}

      - name: Coco PR review
        uses: ./
        with:
          snowflake-account: ${{ vars.SNOWFLAKE_ACCOUNT }}
          snowflake-host: ${{ vars.SNOWFLAKE_HOST }}
          snowflake-user: ${{ vars.SNOWFLAKE_USER }}
          snowflake-role: ${{ vars.SNOWFLAKE_ROLE }}
          snowflake-warehouse: ${{ vars.SNOWFLAKE_WAREHOUSE }}
          coco-app-id: ${{ vars.COCO_APP_ID }}
          coco-app-private-key: ${{ secrets.COCO_APP_PRIVATE_KEY }}

      - name: Dump Cortex Code logs
        if: failure()
        run: |
          echo "=== cortex logs path ==="
          cortex logs path || true
          echo "=== cortex logs errors ==="
          cortex logs errors -n 200 --all-rotations || true
          echo "=== cortex logs tail ==="
          cortex logs tail || true